services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-collaborator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-collaborator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collaborator} -d ${POSTGRES_DB:-collaborator}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-collaborator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-collaborator}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-collaborator}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-collaborator}?sslmode=${POSTGRES_SSLMODE:-disable}"
      - "up"
    restart: "no"

  collaborator:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "80:80/tcp"
      - "443:443/tcp"
      - "25:25/tcp"
      - "587:587/tcp"
    volumes:
      - certmagic_data:/home/collaborator/.local/share/certmagic
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-collaborator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-collaborator}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      DATABASE_URL: postgres://${POSTGRES_USER:-collaborator}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-collaborator}?sslmode=${POSTGRES_SSLMODE:-disable}

volumes:
  postgres_data:
  certmagic_data:
