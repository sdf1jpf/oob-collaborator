name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image ref
        id: meta
        run: |
          repo="${IMAGE_NAME,,}"
          echo "image=${REGISTRY}/${repo}" >>"$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy over SSH
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/oob-collaborator}"

            # Get the latest compose files (deploy.yml + prod override) without
            # clobbering the server's .env.
            git fetch --depth 1 origin main
            git checkout origin/main -- docker-compose.yml docker-compose.prod.yml

            # Authenticate to GHCR so the prebuilt image can be pulled.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export COLLABORATOR_IMAGE="$IMAGE_TAG"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull collaborator
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image }}:${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
